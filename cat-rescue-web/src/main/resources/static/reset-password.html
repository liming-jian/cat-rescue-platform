<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵星守护站 - 重置密码</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Serif+SC:wght@500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f0e6;
            --panel-strong: rgba(255, 248, 239, 0.92);
            --text: #4f3528;
            --text-soft: #80675a;
            --primary: #8a5d3d;
            --primary-deep: #6f462c;
            --accent: #dca983;
            --shadow-xl: 0 32px 70px rgba(84, 53, 31, 0.15);
            --shadow-md: 0 18px 36px rgba(96, 61, 35, 0.10);
            --transition: 220ms ease;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            font-family: 'Quicksand', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 10% 8%, rgba(220,169,131,0.22), transparent 24%),
                radial-gradient(circle at 88% 20%, rgba(138,93,61,0.13), transparent 20%),
                linear-gradient(180deg, #fffaf4 0%, #f7f0e6 46%, #f3eadf 100%);
            display: grid; place-items: center; padding: 24px;
            position: relative; overflow: hidden;
        }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);} }
        @keyframes glowPulse {
            0%,100%{box-shadow:0 0 0 4px rgba(220,169,131,0.18);}
            50%{box-shadow:0 0 0 6px rgba(220,169,131,0.32),0 0 20px rgba(220,169,131,0.12);}
        }
        @keyframes gradientFlow {0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        @keyframes floatPaw {
            0%{transform:translateY(0) rotate(0deg);opacity:0.10;}
            50%{opacity:0.18;}
            100%{transform:translateY(-110vh) rotate(360deg);opacity:0;}
        }
        .bg-paw {
            position:absolute; pointer-events:none; z-index:0;
            animation: floatPaw linear infinite;
        }
        .bg-paw:nth-child(1){left:8%;bottom:-60px;animation-duration:13s;}
        .bg-paw:nth-child(2){left:30%;bottom:-80px;animation-duration:16s;animation-delay:-4s;}
        .bg-paw:nth-child(3){left:55%;bottom:-50px;animation-duration:11s;animation-delay:-7s;}
        .bg-paw:nth-child(4){left:78%;bottom:-70px;animation-duration:14s;animation-delay:-2s;}
        .bg-paw:nth-child(5){left:92%;bottom:-40px;animation-duration:12s;animation-delay:-9s;}

        .container {
            position:relative;z-index:1;width:min(440px,100%);padding:40px 34px;
            border-radius:30px;text-align:center;
            background:var(--panel-strong);
            border:1px solid rgba(255,255,255,0.72);
            box-shadow:var(--shadow-xl);
            backdrop-filter:blur(18px);
            animation:fadeInUp 0.8s ease-out;
        }
        .brand-mark {
            width:46px;height:46px;border-radius:14px;display:grid;place-items:center;
            background:linear-gradient(145deg,#a2704e,#7b4f31);
            box-shadow:inset 0 1px 0 rgba(255,255,255,0.26),0 8px 20px rgba(122,79,49,0.3);
            margin:0 auto 18px;
        }
        .paw-icon {display:block;}
        h2 {margin:0 0 8px;font-family:'Noto Serif SC',serif;font-size:1.8rem;color:var(--primary);letter-spacing:0.03em;}
        .desc {font-size:0.92rem;color:var(--text-soft);margin:0 0 28px;}
        .field {margin-bottom:16px;text-align:left;}
        .field label {display:block;margin-bottom:8px;font-weight:700;color:var(--text);font-size:0.94rem;}
        .input-shell {position:relative;}
        .input-shell input {
            width:100%;min-height:52px;padding:0 16px 0 48px;
            border:1px solid rgba(138,93,61,0.14);border-radius:16px;outline:none;
            background:rgba(255,255,255,0.90);color:var(--text);font-size:1rem;transition:var(--transition);
        }
        .input-shell input:focus {border-color:rgba(138,93,61,0.42);background:#fff;animation:glowPulse 2s ease-in-out infinite;}
        .field-icon {position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-soft);pointer-events:none;display:grid;place-items:center;}
        .eye-icon {
            position:absolute;right:14px;top:50%;transform:translateY(-50%);width:36px;height:36px;
            border-radius:12px;display:grid;place-items:center;cursor:pointer;border:none;
            background:transparent;color:var(--text-soft);transition:var(--transition);
        }
        .eye-icon:hover {background:rgba(220,169,131,0.14);}
        .strength-bar {display:flex;gap:5px;height:6px;margin:12px 0 4px;}
        .bar-segment {flex:1;background:rgba(138,93,61,0.10);border-radius:3px;transition:0.3s;}
        .weak{background:#ff5252!important;}.medium{background:#ffb74d!important;}.strong{background:#66bb6a!important;}
        .strength-text {font-size:0.84rem;color:var(--text-soft);margin-bottom:22px;display:block;text-align:left;min-height:1.2em;}
        .submit-btn {
            width:100%;min-height:52px;border:none;border-radius:18px;color:#fff;
            font-size:1.02rem;font-weight:700;cursor:not-allowed;
            background:#ccc;box-shadow:none;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s ease,background 0.3s;
        }
        .submit-btn.active {
            cursor:pointer;
            background:linear-gradient(135deg,var(--primary),var(--primary-deep),var(--accent),var(--primary));
            background-size:300% 300%;box-shadow:0 18px 30px rgba(121,76,44,0.20);
        }
        .submit-btn.active:hover {transform:scale(1.03) translateY(-2px);box-shadow:0 22px 40px rgba(121,76,44,0.28);animation:gradientFlow 3s ease infinite;}
        .link {display:block;margin-top:20px;color:var(--text-soft);text-decoration:none;font-size:0.92rem;font-weight:600;transition:var(--transition);}
        .link:hover {color:var(--primary);}
        @media(max-width:640px){body{padding:12px;}.container{padding:28px 20px;border-radius:24px;}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}}
    </style>
</head>
<body>

    <svg class="bg-paw" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="26" height="26" aria-hidden="true"><rect x="2" y="2" width="60" height="60" rx="18" fill="currentColor"/><ellipse cx="14.5" cy="18" rx="4.6" ry="6" fill="rgba(255,255,255,0.97)"/><ellipse cx="25.5" cy="13" rx="5.6" ry="7.6" fill="rgba(255,255,255,0.97)"/><ellipse cx="38.5" cy="13" rx="5.6" ry="7.6" fill="rgba(255,255,255,0.97)"/><ellipse cx="49.5" cy="18" rx="4.6" ry="6" fill="rgba(255,255,255,0.97)"/><path d="M32 28c-3.4 0-5.8 0.6-8.2 2-2.6 1.5-4.6 3.8-6.4 6.6-1.4 2.2-3 4.8-3 7.6 0 4 3 6.4 6.4 6.4 2.6 0 4.6-1.2 6.4-2.4 1.6-1.06 3-2.2 4.8-2.2s3.2 1.14 4.8 2.2c1.8 1.2 3.8 2.4 6.4 2.4 3.4 0 6.4-2.4 6.4-6.4 0-2.8-1.6-5.4-3-7.6-1.8-2.8-3.8-5.1-6.4-6.6C37.8 28.6 35.4 28 32 28Z" fill="rgba(255,255,255,0.97)"/></svg>
    <svg class="bg-paw" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="30" height="30" aria-hidden="true"><rect x="2" y="2" width="60" height="60" rx="18" fill="currentColor"/><ellipse cx="14.5" cy="18" rx="4.6" ry="6" fill="rgba(255,255,255,0.97)"/><ellipse cx="25.5" cy="13" rx="5.6" ry="7.6" fill="rgba(255,255,255,0.97)"/><ellipse cx="38.5" cy="13" rx="5.6" ry="7.6" fill="rgba(255,255,255,0.97)"/><ellipse cx="49.5" cy="18" rx="4.6" ry="6" fill="rgba(255,255,255,0.97)"/><path d="M32 28c-3.4 0-5.8 0.6-8.2 2-2.6 1.5-4.6 3.8-6.4 6.6-1.4 2.2-3 4.8-3 7.6 0 4 3 6.4 6.4 6.4 2.6 0 4.6-1.2 6.4-2.4 1.6-1.06 3-2.2 4.8-2.2s3.2 1.14 4.8 2.2c1.8 1.2 3.8 2.4 6.4 2.4 3.4 0 6.4-2.4 6.4-6.4 0-2.8-1.6-5.4-3-7.6-1.8-2.8-3.8-5.1-6.4-6.6C37.8 28.6 35.4 28 32 28Z" fill="rgba(255,255,255,0.97)"/></svg>
    <svg class="bg-paw" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="22" height="22" aria-hidden="true"><rect x="2" y="2" width="60" height="60" rx="18" fill="currentColor"/><ellipse cx="14.5" cy="18" rx="4.6" ry="6" fill="rgba(255,255,255,0.97)"/><ellipse cx="25.5" cy="13" rx="5.6" ry="7.6" fill="rgba(255,255,255,0.97)"/><ellipse cx="38.5" cy="13" rx="5.6" ry="7.6" fill="rgba(255,255,255,0.97)"/><ellipse cx="49.5" cy="18" rx="4.6" ry="6" fill="rgba(255,255,255,0.97)"/><path d="M32 28c-3.4 0-5.8 0.6-8.2 2-2.6 1.5-4.6 3.8-6.4 6.6-1.4 2.2-3 4.8-3 7.6 0 4 3 6.4 6.4 6.4 2.6 0 4.6-1.2 6.4-2.4 1.6-1.06 3-2.2 4.8-2.2s3.2 1.14 4.8 2.2c1.8 1.2 3.8 2.4 6.4 2.4 3.4 0 6.4-2.4 6.4-6.4 0-2.8-1.6-5.4-3-7.6-1.8-2.8-3.8-5.1-6.4-6.6C37.8 28.6 35.4 28 32 28Z" fill="rgba(255,255,255,0.97)"/></svg>
    <svg class="bg-paw" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="28" height="28" aria-hidden="true"><rect x="2" y="2" width="60" height="60" rx="18" fill="currentColor"/><ellipse cx="14.5" cy="18" rx="4.6" ry="6" fill="rgba(255,255,255,0.97)"/><ellipse cx="25.5" cy="13" rx="5.6" ry="7.6" fill="rgba(255,255,255,0.97)"/><ellipse cx="38.5" cy="13" rx="5.6" ry="7.6" fill="rgba(255,255,255,0.97)"/><ellipse cx="49.5" cy="18" rx="4.6" ry="6" fill="rgba(255,255,255,0.97)"/><path d="M32 28c-3.4 0-5.8 0.6-8.2 2-2.6 1.5-4.6 3.8-6.4 6.6-1.4 2.2-3 4.8-3 7.6 0 4 3 6.4 6.4 6.4 2.6 0 4.6-1.2 6.4-2.4 1.6-1.06 3-2.2 4.8-2.2s3.2 1.14 4.8 2.2c1.8 1.2 3.8 2.4 6.4 2.4 3.4 0 6.4-2.4 6.4-6.4 0-2.8-1.6-5.4-3-7.6-1.8-2.8-3.8-5.1-6.4-6.6C37.8 28.6 35.4 28 32 28Z" fill="rgba(255,255,255,0.97)"/></svg>

    <div class="container">
        <span class="brand-mark">
            <svg class="paw-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="30" height="30" aria-hidden="true"><ellipse cx="14.5" cy="18" rx="4.6" ry="6" fill="white"/><ellipse cx="25.5" cy="13" rx="5.6" ry="7.6" fill="white"/><ellipse cx="38.5" cy="13" rx="5.6" ry="7.6" fill="white"/><ellipse cx="49.5" cy="18" rx="4.6" ry="6" fill="white"/><path d="M32 28c-3.4 0-5.8 0.6-8.2 2-2.6 1.5-4.6 3.8-6.4 6.6-1.4 2.2-3 4.8-3 7.6 0 4 3 6.4 6.4 6.4 2.6 0 4.6-1.2 6.4-2.4 1.6-1.06 3-2.2 4.8-2.2s3.2 1.14 4.8 2.2c1.8 1.2 3.8 2.4 6.4 2.4 3.4 0 6.4-2.4 6.4-6.4 0-2.8-1.6-5.4-3-7.6-1.8-2.8-3.8-5.1-6.4-6.6C37.8 28.6 35.4 28 32 28Z" fill="white"/></svg>
        </span>
        <h2>重置密码</h2>
        <p class="desc">为了账号安全，请设置一个强密码</p>
        <div class="field">
            <label for="resetUser">用户名</label>
            <div class="input-shell">
                <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                <input type="text" id="resetUser" placeholder="请输入用户名">
            </div>
        </div>

        <div class="field">
            <label for="newPass">新密码</label>
            <div class="input-shell">
                <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
                <input type="password" id="newPass" placeholder="新密码 (需含大小写字母+数字)" oninput="checkStrength()">
                <button type="button" class="eye-icon" id="eyeReset" onclick="togglePass('newPass','eyeReset')">
                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>

        <div class="strength-bar">
            <div id="bar1" class="bar-segment"></div>
            <div id="bar2" class="bar-segment"></div>
            <div id="bar3" class="bar-segment"></div>
        </div>
        <span id="strengthText" class="strength-text">密码强度：未检测</span>

        <button class="submit-btn" id="btnReset" onclick="doReset()" disabled>确认重置</button>
        <a href="login.html" class="link">想起密码了？去登录</a>
    </div>

    <script>
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            }
        }

        function checkStrength() {
            const pass = document.getElementById('newPass').value;
            const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
            const text = document.getElementById('strengthText');
            const btn = document.getElementById('btnReset');
            bars.forEach(b => b.className = 'bar-segment');
            btn.className = 'submit-btn'; btn.disabled = true;
            if(!pass) { text.innerText = "密码强度：未检测"; text.style.color="var(--text-soft)"; return; }
            let score = 0;
            if (pass.length >= 6) score++;
            if (/[a-z]/.test(pass) && /[A-Z]/.test(pass)) score++;
            if (/[0-9]/.test(pass)) score++;
            if (score === 1) { bars[0].classList.add('weak'); text.innerText = "强度：弱 (太简单)"; text.style.color = "#ff5252"; }
            else if (score === 2) { bars[0].classList.add('medium'); bars[1].classList.add('medium'); text.innerText = "强度：中 (还差一点)"; text.style.color = "#ffb74d"; }
            else if (score === 3) { bars[0].classList.add('strong'); bars[1].classList.add('strong'); bars[2].classList.add('strong'); text.innerText = "强度：强 (可以使用)"; text.style.color = "#66bb6a"; btn.disabled = false; btn.className = 'submit-btn active'; }
        }

        function doReset() {
            const user = document.getElementById('resetUser').value;
            const pass = document.getElementById('newPass').value;
            fetch('http://localhost:8081/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, newPassword: pass })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) { alert('密码重置成功！请重新登录。'); window.location.href = 'login.html'; }
                else { alert('重置失败: ' + data.message); }
            })
            .catch(() => alert('无法连接服务器'));
        }
    </script>
</body>
</html>
