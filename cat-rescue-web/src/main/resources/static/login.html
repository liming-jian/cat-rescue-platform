<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵星守护站 - 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Serif+SC:wght@500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f0e6;
            --panel-strong: rgba(255, 248, 239, 0.92);
            --text: #4f3528;
            --text-soft: #80675a;
            --primary: #8a5d3d;
            --primary-deep: #6f462c;
            --accent: #dca983;
            --shadow-xl: 0 32px 70px rgba(84, 53, 31, 0.15);
            --shadow-md: 0 18px 36px rgba(96, 61, 35, 0.10);
            --transition: 220ms ease;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            font-family: 'Quicksand', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 10% 8%, rgba(220,169,131,0.22), transparent 24%),
                radial-gradient(circle at 88% 20%, rgba(138,93,61,0.13), transparent 20%),
                linear-gradient(180deg, #fffaf4 0%, #f7f0e6 46%, #f3eadf 100%);
            display: grid; place-items: center; padding: 24px;
            position: relative; overflow-x: hidden;
        }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);} }
        @keyframes glowPulse {
            0%,100%{box-shadow:0 0 0 4px rgba(220,169,131,0.18);}
            50%{box-shadow:0 0 0 6px rgba(220,169,131,0.32),0 0 20px rgba(220,169,131,0.12);}
        }
        @keyframes gradientFlow {0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        @keyframes floatPaw {
            0%{transform:translateY(0) rotate(0deg);opacity:0.13;}
            50%{opacity:0.22;}
            100%{transform:translateY(-720px) rotate(360deg);opacity:0;}
        }
        .auth-shell {
            position:relative;z-index:1;width:min(1180px,100%);min-height:720px;
            display:grid;grid-template-columns:minmax(0,1.08fr) minmax(360px,430px);
            border-radius:40px;overflow:hidden;background:rgba(255,255,255,0.48);
            border:1px solid rgba(255,255,255,0.6);box-shadow:var(--shadow-xl);
            backdrop-filter:blur(18px);animation:fadeInUp 0.8s ease-out;
        }
        .visual-panel {
            position:relative;padding:40px 42px 34px;color:#fffaf4;
            background:linear-gradient(140deg,rgba(57,33,19,0.82) 0%,rgba(94,58,38,0.52) 44%,rgba(244,224,207,0.08) 100%),
                url('https://images.unsplash.com/photo-1513360371669-4adf3dd7dff8?w=1600') center/cover;
            display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;
        }
        .visual-panel::after {
            content:'';position:absolute;inset:auto -12% -18% auto;width:360px;height:360px;
            border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.18),transparent 68%);
        }
        .paw-particle {position:absolute;opacity:0.13;pointer-events:none;z-index:0;animation:floatPaw linear infinite;}
        .paw-particle:nth-child(1){left:10%;top:80%;animation-duration:12s;}
        .paw-particle:nth-child(2){left:30%;top:90%;animation-duration:15s;animation-delay:-3s;}
        .paw-particle:nth-child(3){left:55%;top:85%;animation-duration:10s;animation-delay:-6s;}
        .paw-particle:nth-child(4){left:75%;top:95%;animation-duration:14s;animation-delay:-2s;}
        .paw-particle:nth-child(5){left:45%;top:75%;animation-duration:11s;animation-delay:-8s;}
        .brand-bar {position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:16px;}
        .brand-link {display:inline-flex;align-items:center;gap:12px;color:#fffaf4;text-decoration:none;}
        .brand-mark {
            width:46px;height:46px;border-radius:14px;display:grid;place-items:center;
            background:linear-gradient(145deg,#a2704e,#7b4f31);
            box-shadow:inset 0 1px 0 rgba(255,255,255,0.26),0 8px 20px rgba(122,79,49,0.3);
        }
        .brand-copy strong {display:block;font-family:'Noto Serif SC',serif;font-size:1.1rem;letter-spacing:0.06em;}
        .brand-copy span {display:block;margin-top:2px;font-size:0.82rem;color:rgba(255,244,232,0.80);}
        .home-btn {
            display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;
            border-radius:999px;color:#fffaf4;background:rgba(255,255,255,0.12);
            border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(10px);text-decoration:none;transition:var(--transition);
        }
        .home-btn:hover{background:rgba(255,255,255,0.22);}
        .hero-copy {position:relative;z-index:1;max-width:560px;padding:36px 0;}
        .eyebrow {
            display:inline-flex;align-items:center;gap:10px;min-height:40px;padding:0 14px;
            border-radius:999px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.16);
            backdrop-filter:blur(8px);font-size:0.84rem;letter-spacing:0.08em;text-transform:uppercase;
        }
        .hero-copy h1 {margin:24px 0 18px;font-family:'Noto Serif SC','Cormorant Garamond',serif;font-size:clamp(2.8rem,4vw,4.2rem);line-height:1.16;letter-spacing:0.03em;}
        .hero-copy p {margin:0;color:rgba(255,244,232,0.88);line-height:1.95;font-size:1.03rem;}
        .hero-points {position:relative;z-index:1;display:grid;gap:14px;margin-top:30px;}
        .hero-point {display:grid;grid-template-columns:64px minmax(0,1fr);gap:16px;align-items:center;padding:16px 18px;border-radius:22px;background:rgba(255,250,244,0.10);border:1px solid rgba(255,250,244,0.16);backdrop-filter:blur(12px);transition:transform 240ms ease,background 240ms ease;}
        .hero-point:hover {transform:translateY(-3px);background:rgba(255,250,244,0.16);}
        .hero-point-icon {width:50px !important;height:50px !important;border-radius:16px;display:inline-flex !important;align-items:center !important;justify-content:center !important;margin:0;align-self:center;justify-self:center;flex-shrink:0;color:#fff;background:linear-gradient(145deg,#b67e56,#8a5e40);box-shadow:0 8px 18px rgba(35,22,14,0.22);padding:0;line-height:1;vertical-align:middle;}
        .hero-point-icon svg {display:block !important;flex:none;width:24px;height:24px;overflow:visible;transform:none;margin:0;}
        .hero-point strong {display:block;margin-bottom:4px;font-size:0.98rem;}
        .hero-point span {display:block;color:rgba(255,244,232,0.80);line-height:1.75;font-size:0.9rem;}
        .form-panel {
            background:linear-gradient(180deg,rgba(255,251,247,0.96),rgba(255,247,239,0.88));
            backdrop-filter:blur(18px);padding:42px 34px;display:flex;align-items:center;
            animation:fadeInUp 0.8s ease-out 0.2s both;
        }
        .form-card {width:100%;padding:30px;border-radius:30px;background:var(--panel-strong);border:1px solid rgba(255,255,255,0.72);box-shadow:var(--shadow-md);}
        .form-head h2 {margin:0;font-family:'Noto Serif SC',serif;font-size:2rem;letter-spacing:0.03em;}
        .form-head p {margin:12px 0 0;color:var(--text-soft);line-height:1.8;font-size:0.95rem;}
        .data-strip {display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:24px 0 26px;}
        .data-pill {padding:14px 14px 12px;border-radius:20px;background:rgba(255,255,255,0.82);border:1px solid rgba(138,93,61,0.10);}
        .data-pill strong {display:block;font-size:1.28rem;font-family:'Cormorant Garamond',serif;color:var(--primary);}
        .data-pill span {display:block;margin-top:4px;color:var(--text-soft);font-size:0.84rem;}
        form {margin-top:8px;}
        .field {margin-bottom:16px;}
        .field label {display:block;margin-bottom:8px;font-weight:700;color:var(--text);font-size:0.94rem;}
        .input-shell {position:relative;}
        .input-shell input {
            width:100%;min-height:54px;padding:0 16px 0 48px;
            border:1px solid rgba(138,93,61,0.14);border-radius:16px;outline:none;
            background:rgba(255,255,255,0.90);color:var(--text);font-size:1rem;transition:var(--transition);
        }
        .input-shell input:focus {border-color:rgba(138,93,61,0.42);background:#fff;animation:glowPulse 2s ease-in-out infinite;}
        .field-icon {position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-soft);pointer-events:none;display:grid;place-items:center;}
        .eye-icon {
            position:absolute;right:14px;top:50%;transform:translateY(-50%);width:36px;height:36px;
            border-radius:12px;display:grid;place-items:center;cursor:pointer;border:none;
            background:transparent;color:var(--text-soft);transition:var(--transition);
        }
        .eye-icon:hover {background:rgba(220,169,131,0.14);}
        .helper-row {margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;color:var(--text-soft);font-size:0.84rem;}
        .helper-row a {color:var(--primary);font-weight:700;text-decoration:none;}
        .submit-btn {
            width:100%;min-height:54px;margin-top:8px;border:none;border-radius:18px;color:#fff;
            font-size:1.02rem;font-weight:700;letter-spacing:0.03em;cursor:pointer;
            background:linear-gradient(135deg,var(--primary),var(--primary-deep),var(--accent),var(--primary));
            background-size:300% 300%;box-shadow:0 18px 30px rgba(121,76,44,0.20);
            transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s ease;
        }
        .submit-btn:hover {transform:scale(1.03) translateY(-2px);box-shadow:0 22px 40px rgba(121,76,44,0.28);animation:gradientFlow 3s ease infinite;}
        .submit-btn:active {transform:scale(0.98);}
        .action-links {margin-top:18px;display:grid;gap:10px;}
        .action-links a {display:inline-flex;align-items:center;justify-content:center;min-height:46px;border-radius:16px;font-weight:700;text-decoration:none;transition:var(--transition);}
        .link-secondary {color:var(--primary);background:rgba(220,169,131,0.12);}
        .link-secondary:hover {background:rgba(220,169,131,0.22);}
        .link-ghost {color:var(--text-soft);background:rgba(255,255,255,0.78);border:1px solid rgba(138,93,61,0.10);}
        .link-ghost:hover {background:#fff;}
        .paw-icon {display:block;}
        @media(max-width:980px){.auth-shell{grid-template-columns:1fr;min-height:auto;}.visual-panel,.form-panel{padding:26px 22px;}}
        @media(max-width:640px){body{padding:12px;}.form-card{padding:22px 18px;border-radius:24px;}.data-strip{grid-template-columns:1fr;}.brand-bar{flex-direction:column;align-items:flex-start;}.home-btn{width:100%;justify-content:center;}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}}
    </style>
</head>

            <div class="form-card">
                <div class="form-head">
                    <h2>账号登录</h2>
                    <p>请输入你在平台中的账号信息，继续你的守护旅程</p>
                </div>
                <div class="data-strip">
                    <div class="data-pill"><strong>用户端</strong><span>浏览猫咪、提交申请、接收通知</span></div>
                    <div class="data-pill"><strong>管理端</strong><span>处理数据、更新状态、查看后台</span></div>

                <form id="loginForm">
                    <div class="field">
                        <label for="username">用户名</label>
                        <div class="input-shell">
                            <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                            <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
                        </div>
                    </div>
                    <div class="field">
                        <label for="password">密码</label>
                        <div class="input-shell">
                            <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
                            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
                            <button type="button" class="eye-icon" id="eyeLogin" onclick="togglePass('password','eyeLogin')">
                                <svg id="eyeSvgOpen" viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <div class="helper-row">
                            <span>管理员账号登录后会自动进入后台</span>
                            <a href="reset-password.html">忘记密码</a>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">立即登录</button>
                </form>
                <div class="action-links">
                    <a href="register.html" class="link-secondary">还没有账号，去注册</a>
                    <a href="index.html" class="link-ghost">先随便逛逛首页</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            fetch('http://localhost:8081/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('currentUser', data.user.username);
                    localStorage.setItem('userRole', data.user.role);
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    alert('登录失败：' + data.message);
                }
            })
            .catch(() => alert('服务器未响应'));
        });
    </script>
</body>
</html>
